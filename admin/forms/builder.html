<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FormCraft — Field Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../assets/css/admin.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">Form<span>Craft</span></div>
    <nav class="sidebar-nav">
      <a href="../dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Forms
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-initial">A</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Admin</div>
        <div class="user-role">Administrator</div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <a href="../dashboard.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Forms
        </a>
        <h1 class="page-title" id="form-name-title">Field Builder</h1>
        <p class="page-sub" id="form-desc-sub"></p>
      </div>
      <div style="display:flex;gap:.7rem;align-items:center">
        <a id="preview-link" href="#" target="_blank" class="btn-ghost" style="font-size:.88rem;padding:.55rem 1rem;">Preview ↗</a>
        <a id="submissions-link" href="#" class="btn-ghost" style="font-size:.88rem;padding:.55rem 1rem;">Submissions</a>
      </div>
    </header>

    <!-- Public URL bar -->
    <div style="padding:0 2.2rem;margin-bottom:.8rem">
      <div class="url-row">
        <span style="white-space:nowrap;font-weight:600;color:var(--text)">Public URL:</span>
        <a id="public-url" href="#" target="_blank">#</a>
        <button class="url-copy-btn" id="copy-url-btn">Copy</button>
      </div>
    </div>

    <div class="builder-layout">
      <!-- Left: Field type palette -->
      <div>
        <div class="panel">
          <div class="panel-title">Add Field</div>
          <div class="field-types">
            <button class="field-type-btn" data-type="text">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
              Text
            </button>
            <button class="field-type-btn" data-type="email">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/></svg>
              Email
            </button>
            <button class="field-type-btn" data-type="number">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
              Number
            </button>
            <button class="field-type-btn" data-type="textarea">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h10"/><path d="M7 12h10"/><path d="M7 17h6"/></svg>
              Textarea
            </button>
            <button class="field-type-btn" data-type="dropdown">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="m16 10-4 4-4-4"/></svg>
              Dropdown
            </button>
            <button class="field-type-btn" data-type="radio">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
              Radio
            </button>
            <button class="field-type-btn" data-type="checkbox">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><polyline points="9 12 11 14 15 10"/></svg>
              Checkbox
            </button>
            <button class="field-type-btn" data-type="file">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
              File Upload
            </button>
          </div>
        </div>
      </div>

      <!-- Right: Canvas -->
      <div>
        <div class="panel">
          <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center">
            <span>Form Fields</span>
            <span id="field-count-badge" style="color:var(--muted);font-size:.8rem;font-weight:500"></span>
          </div>
          <div class="fields-canvas" id="fields-canvas">
            <div class="canvas-empty" id="canvas-empty">
              <svg viewBox="0 0 64 64" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--border2);margin-bottom:.8rem">
                <rect x="8" y="8" width="48" height="48" rx="6"/>
                <line x1="20" y1="24" x2="44" y2="24"/>
                <line x1="20" y1="32" x2="44" y2="32"/>
                <line x1="20" y1="40" x2="36" y2="40"/>
              </svg>
              <p>Click a field type on the left to add it</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Field Modal -->
<div class="modal-overlay" id="field-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="field-modal-title">Add Field</h2>
      <button class="modal-close" id="field-modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editing-field-id" value=""/>
      <input type="hidden" id="editing-field-type" value=""/>

      <div class="form-field">
        <label>Field Type</label>
        <div id="field-type-display" style="color:var(--accent);font-weight:600;font-size:.93rem;text-transform:capitalize"></div>
      </div>
      <div class="form-field">
        <label>Label <span class="req">*</span></label>
        <input type="text" id="f-label" placeholder="e.g. Full Name" maxlength="200"/>
        <div class="field-error" id="err-f-label"></div>
      </div>
      <div class="form-field" id="placeholder-row">
        <label>Placeholder</label>
        <input type="text" id="f-placeholder" placeholder="Optional placeholder text" maxlength="200"/>
      </div>
      <div class="form-field" id="options-row" style="display:none">
        <label>Options <span class="req">*</span></label>
        <div class="options-list" id="options-list"></div>
        <button class="add-option-btn" id="add-option-btn">+ Add Option</button>
        <div class="field-error" id="err-options"></div>
      </div>
      <div class="form-field">
        <label class="toggle-label">
          <input type="checkbox" id="f-required"/>
          <span>Required field</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="field-modal-cancel">Cancel</button>
      <button class="btn-primary" id="field-modal-save">Add Field</button>
    </div>
  </div>
</div>

<!-- Delete Field Confirm -->
<div class="modal-overlay" id="field-delete-modal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>Delete Field?</h2>
      <button class="modal-close" id="fd-close">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--muted);font-size:.93rem;line-height:1.6">
        Remove <strong id="fd-field-name"></strong>? Existing submission data for this field will also be lost.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="fd-cancel">Cancel</button>
      <button class="btn-danger" id="fd-confirm">Delete</button>
    </div>
  </div>
</div>

<script src="../../assets/js/api.js"></script>
<script>
// ── fix API base path for nested admin pages ──
const API_BASE = '../../api/index.php';

const params  = new URLSearchParams(location.search);
const formId  = params.get('id');
if (!formId) location.href = '../dashboard.html';

let fields = [];
let deletingFieldId = null;
let dragSrcIndex    = null;

// ── Init ─────────────────────────────────────────────────────
Auth.init();
const user = Auth.getUser();
if (user) {
  document.getElementById('user-name').textContent    = user.name;
  document.getElementById('user-initial').textContent = user.name[0].toUpperCase();
}
document.getElementById('logout-btn').onclick = () => Auth.logout();

// Set links
const BASE_URL = location.origin + location.pathname.replace('/admin/forms/builder.html', '');
document.getElementById('preview-link').href     = `../../public/form.html?id=${formId}`;
document.getElementById('submissions-link').href = `../submissions/index.html?form_id=${formId}`;
const publicURL = `${BASE_URL}/public/form.html?id=${formId}`;
document.getElementById('public-url').textContent = publicURL;
document.getElementById('public-url').href        = publicURL;
document.getElementById('copy-url-btn').onclick   = () => {
  navigator.clipboard.writeText(publicURL).then(() => toast('URL copied!'));
};

// ── Load form ─────────────────────────────────────────────────
async function loadForm() {
  const data = await API.get(`/forms/${formId}`);
  if (!data.success) { toast(data.message, 'error'); return; }

  document.getElementById('form-name-title').textContent = data.data.name;
  document.getElementById('form-desc-sub').textContent   = data.data.description || '';
  document.title = `${data.data.name} — Builder`;

  fields = data.data.fields || [];
  renderCanvas();
}
loadForm();

// ── Canvas render ─────────────────────────────────────────────
function renderCanvas() {
  const canvas = document.getElementById('fields-canvas');
  const empty  = document.getElementById('canvas-empty');
  const badge  = document.getElementById('field-count-badge');

  badge.textContent = fields.length ? `${fields.length} field${fields.length !== 1 ? 's' : ''}` : '';

  if (!fields.length) {
    canvas.innerHTML = '';
    canvas.appendChild(empty);
    empty.style.display = 'block';
    return;
  }

  canvas.innerHTML = fields.map((f, i) => `
    <div class="field-row" draggable="true" data-index="${i}" data-id="${f.id}">
      <div class="drag-handle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9"  cy="6"  r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="6"  r="1" fill="currentColor" stroke="none"/>
          <circle cx="9"  cy="12" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="12" r="1" fill="currentColor" stroke="none"/>
          <circle cx="9"  cy="18" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="18" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="field-row-info">
        <div class="field-row-label">${esc(f.label)}</div>
        <div class="field-row-type">${f.field_type}${f.options ? ` · ${(f.options||[]).length} option${f.options.length!==1?'s':''}` : ''}</div>
      </div>
      ${f.is_required ? '<span class="field-req-badge">Required</span>' : ''}
      <div style="display:flex;gap:.35rem">
        <button class="icon-btn" title="Edit" onclick="openEditField(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn danger" title="Delete" onclick="openDeleteField(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`).join('');

  // Drag-and-drop
  canvas.querySelectorAll('.field-row').forEach(row => {
    row.addEventListener('dragstart', e => { dragSrcIndex = +row.dataset.index; row.classList.add('dragging'); });
    row.addEventListener('dragend',   () => row.classList.remove('dragging'));
    row.addEventListener('dragover',  e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop',      async e => {
      e.preventDefault(); row.classList.remove('drag-over');
      const targetIndex = +row.dataset.index;
      if (dragSrcIndex === targetIndex) return;
      const moved = fields.splice(dragSrcIndex, 1)[0];
      fields.splice(targetIndex, 0, moved);
      renderCanvas();
      // Persist reorder
      await API.put(`/forms/${formId}/fields/reorder`, { order: fields.map(f => f.id) });
    });
  });
}

// ── Add field buttons ─────────────────────────────────────────
document.querySelectorAll('.field-type-btn').forEach(btn => {
  btn.onclick = () => openAddField(btn.dataset.type);
});

function openAddField(type) {
  document.getElementById('editing-field-id').value   = '';
  document.getElementById('editing-field-type').value = type;
  document.getElementById('field-modal-title').textContent = 'Add Field';
  document.getElementById('field-modal-save').textContent  = 'Add Field';
  document.getElementById('field-type-display').textContent = type;
  document.getElementById('f-label').value       = '';
  document.getElementById('f-placeholder').value = '';
  document.getElementById('f-required').checked  = false;
  document.getElementById('err-f-label').textContent = '';
  document.getElementById('err-options').textContent  = '';

  const optionTypes = ['dropdown','radio','checkbox'];
  document.getElementById('options-row').style.display      = optionTypes.includes(type) ? 'flex' : 'none';
  document.getElementById('placeholder-row').style.display  = type === 'file' ? 'none' : 'flex';

  document.getElementById('options-list').innerHTML = '';
  if (optionTypes.includes(type)) addOptionRow('');

  document.getElementById('field-modal').classList.add('open');
}

function openEditField(index) {
  const f    = fields[index];
  const type = f.field_type;

  document.getElementById('editing-field-id').value   = f.id;
  document.getElementById('editing-field-type').value = type;
  document.getElementById('field-modal-title').textContent = 'Edit Field';
  document.getElementById('field-modal-save').textContent  = 'Save Changes';
  document.getElementById('field-type-display').textContent = type;
  document.getElementById('f-label').value       = f.label;
  document.getElementById('f-placeholder').value = f.placeholder || '';
  document.getElementById('f-required').checked  = !!f.is_required;
  document.getElementById('err-f-label').textContent = '';
  document.getElementById('err-options').textContent  = '';

  const optionTypes = ['dropdown','radio','checkbox'];
  document.getElementById('options-row').style.display     = optionTypes.includes(type) ? 'flex' : 'none';
  document.getElementById('placeholder-row').style.display = type === 'file' ? 'none' : 'flex';

  document.getElementById('options-list').innerHTML = '';
  if (optionTypes.includes(type)) {
    (f.options || []).forEach(o => addOptionRow(o));
    if (!(f.options||[]).length) addOptionRow('');
  }

  document.getElementById('field-modal').classList.add('open');
}

function addOptionRow(value = '') {
  const list = document.getElementById('options-list');
  const row  = document.createElement('div');
  row.className = 'option-row';
  row.innerHTML = `
    <input type="text" class="option-input" placeholder="Option value" value="${esc(value)}" style="flex:1;padding:.6rem .9rem;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:.9rem;outline:none"/>
    <button class="option-remove-btn" type="button">✕</button>`;
  row.querySelector('.option-remove-btn').onclick = () => row.remove();
  list.appendChild(row);
}

document.getElementById('add-option-btn').onclick = () => addOptionRow('');

// ── Save field ────────────────────────────────────────────────
document.getElementById('field-modal-save').onclick = async () => {
  const editId = document.getElementById('editing-field-id').value;
  const type   = document.getElementById('editing-field-type').value;
  const label  = document.getElementById('f-label').value.trim();
  const ph     = document.getElementById('f-placeholder').value.trim();
  const req    = document.getElementById('f-required').checked;

  document.getElementById('err-f-label').textContent = '';
  document.getElementById('err-options').textContent  = '';

  if (!label) { document.getElementById('err-f-label').textContent = 'Label is required.'; return; }

  const optionTypes = ['dropdown','radio','checkbox'];
  let options = null;
  if (optionTypes.includes(type)) {
    options = [...document.querySelectorAll('.option-input')].map(i => i.value.trim()).filter(Boolean);
    if (!options.length) { document.getElementById('err-options').textContent = 'Add at least one option.'; return; }
  }

  const payload = { label, placeholder: ph, field_type: type, is_required: req ? 1 : 0, options };
  const btn = document.getElementById('field-modal-save');
  btn.disabled = true;

  try {
    let data;
    if (editId) {
      data = await API.put(`/forms/${formId}/fields/${editId}`, payload);
    } else {
      data = await API.post(`/forms/${formId}/fields`, payload);
    }
    if (!data.success) throw new Error(data.message);
    toast(editId ? 'Field updated.' : 'Field added.', 'success');
    document.getElementById('field-modal').classList.remove('open');
    await loadForm();
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
  }
};

['field-modal-close','field-modal-cancel'].forEach(id =>
  document.getElementById(id).onclick = () => document.getElementById('field-modal').classList.remove('open'));

// ── Delete field ──────────────────────────────────────────────
function openDeleteField(index) {
  deletingFieldId = fields[index].id;
  document.getElementById('fd-field-name').textContent = `"${fields[index].label}"`;
  document.getElementById('field-delete-modal').classList.add('open');
}

document.getElementById('fd-confirm').onclick = async () => {
  const btn = document.getElementById('fd-confirm');
  btn.disabled = true;
  try {
    const data = await API.delete(`/forms/${formId}/fields/${deletingFieldId}`);
    if (!data.success) throw new Error(data.message);
    toast('Field deleted.');
    document.getElementById('field-delete-modal').classList.remove('open');
    await loadForm();
  } catch (err) {
    toast(err.message, 'error');
  } finally { btn.disabled = false; }
};
['fd-close','fd-cancel'].forEach(id =>
  document.getElementById(id).onclick = () => document.getElementById('field-delete-modal').classList.remove('open'));
</script>
</body>
</html>
